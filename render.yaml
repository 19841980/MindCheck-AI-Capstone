services:
  - type: web
    name: mindcheck-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: "http://localhost:5173,https://mindcheck-ai.vercel.app"
